<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body{font-family:Arial;background:#1e3c72;height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:white;padding:40px;border-radius:10px;width:300px}
input,button{width:100%;padding:10px;margin:8px 0}
button{background:#1e3c72;color:white;border:none}
</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<form method="post">

<input name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button>Register</button>

</form>

</div>

</body>
</html>
