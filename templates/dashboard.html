<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Inventory Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-warehouse"></i>
            <span>InventoryPro</span>
        </div>
        <div class="nav-user">
            <span id="usernameDisplay">Loading...</span>
            <button id="logoutBtn" class="btn-logout" title="Logout">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="receive">
                <i class="fas fa-arrow-down"></i> Receive
            </button>
            <button class="tab-btn" data-tab="issue">
                <i class="fas fa-arrow-up"></i> Issue
            </button>
            <button class="tab-btn" data-tab="history">
                <i class="fas fa-history"></i> History
            </button>
        </div>

        <!-- Receive Tab -->
        <div id="receive" class="tab-content active">
            <div class="card">
                <h3><i class="fas fa-plus-circle"></i> Receive Items</h3>
                <form id="receiveForm">
                    <div class="form-group">
                        <label>Select Item</label>
                        <div class="select-wrapper">
                            <select id="receiveItem">
                                <option value="">Choose item...</option>
                            </select>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Quantity</label>
                            <input type="number" id="receiveQty" min="1" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Unit Price (Optional)</label>
                            <input type="number" id="receivePrice" step="0.01" min="0" placeholder="0.00">
                        </div>
                    </div>
                    <button type="button" id="receiveBtn" class="btn-success" disabled>
                        <i class="fas fa-check"></i> Receive Item
                    </button>
                    <div id="receiveMsg" class="message"></div>
                </form>
            </div>
        </div>

        <!-- Issue Tab -->
        <div id="issue" class="tab-content">
            <div class="card">
                <h3><i class="fas fa-minus-circle"></i> Issue Items</h3>
                <form id="issueForm">
                    <div class="form-group">
                        <label>Select Item</label>
                        <div class="select-wrapper">
                            <select id="issueItem">
                                <option value="">Choose item...</option>
                            </select>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="issueQty" min="1" placeholder="0">
                    </div>
                    <div id="availableQty" class="available-stock"></div>
                    <button type="button" id="issueBtn" class="btn-danger" disabled>
                        <i class="fas fa-paper-plane"></i> Issue Item
                    </button>
                    <div id="issueMsg" class="message"></div>
                </form>
            </div>
        </div>

        <!-- History Tab -->
        <div id="history" class="tab-content">
            <div class="card">
                <h3><i class="fas fa-history"></i> Transaction History</h3>
                <div class="table-container">
                    <table id="historyTable">
                        <thead>
                            <tr>
                                <th>Date & Time</th>
                                <th>Item Name</th>
                                <th>Quantity</th>
                                <th>Type</th>
                                <th>Unit Price</th>
                                <th>Total Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 2rem;">
                                    <i class="fas fa-spinner fa-spin"></i> Loading transactions...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
