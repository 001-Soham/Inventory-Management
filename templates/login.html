<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{font-family:Arial;background:#2a5298;height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:white;padding:40px;border-radius:10px;width:300px}
input,button{width:100%;padding:10px;margin:8px 0}
button{background:#2a5298;color:white;border:none}
</style>
</head>

<body>

<div class="box">

<h2>Login</h2>

<form method="post">
<input name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button>Login</button>
</form>

<a href="/register">Create account</a>

</div>

</body>
</html>
